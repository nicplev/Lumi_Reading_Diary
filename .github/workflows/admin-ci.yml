name: admin-ci

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'packages/**'
      - 'functions/src/audio_authority.ts'
      - 'functions/src/book_cover_ocr.ts'
      - 'functions/src/book_cover_ocr_flag.ts'
      - 'test/cover_ocr_flag.parity.test.ts'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/admin-ci.yml'
  pull_request:
    paths:
      - 'admin/**'
      - 'packages/**'
      - 'functions/src/audio_authority.ts'
      - 'functions/src/book_cover_ocr.ts'
      - 'functions/src/book_cover_ocr_flag.ts'
      - 'test/cover_ocr_flag.parity.test.ts'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/admin-ci.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Dummy build-time values. Every admin route is server-rendered on demand
      # (next build output shows all `ƒ`), so NEXT_PUBLIC_* values are only
      # read at runtime; the values here just satisfy Next's env-availability
      # checks at compile time.
      NEXT_PUBLIC_FIREBASE_API_KEY: ci
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '0'
      NEXT_PUBLIC_FIREBASE_APP_ID: ci
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Audio authority parity
        run: pnpm test:audio-authority
      # Portal and Cloud Functions must resolve the same feature-flag docs to
      # the same state. A drift here makes a kill switch display a state the
      # feature is not in — silent until an incident.
      - name: Feature-flag parity
        run: pnpm test:flag-parity
      - name: Typecheck
        run: pnpm --filter lumi-admin-scaffold exec tsc --noEmit
      - name: Lint
        run: pnpm --filter lumi-admin-scaffold lint
      - name: Build
        run: pnpm --filter lumi-admin-scaffold build
