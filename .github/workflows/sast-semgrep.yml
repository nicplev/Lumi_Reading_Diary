# Semgrep — Static Application Security Testing (the SAST gap in ST4S Q5/EV13).
# Community rulesets; no SaaS token required. Report-only (uploads SARIF to the
# Security tab) so it informs rather than blocks while the baseline is triaged.
#
# Triggers: PRs into main, a monthly schedule, and manual dispatch. Not on push.
name: SAST (semgrep)

on:
  # NOTE: per-PR trigger disabled for the initial landing to keep PR checks
  # clean; runs monthly + on demand. Re-add `pull_request: { branches: [main] }`
  # after a green baseline run confirms the config.
  schedule:
    - cron: "23 3 1 * *"
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run semgrep
        run: |
          semgrep scan \
            --config p/default \
            --config p/typescript \
            --config p/javascript \
            --config p/secrets \
            --sarif --output semgrep.sarif \
            --metrics off || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
