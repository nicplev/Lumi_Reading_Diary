name: Weekly security review

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

concurrency:
  group: weekly-security-review
  cancel-in-progress: false

jobs:
  functions-rules-and-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Functions dependencies
        working-directory: functions
        run: npm ci
      - name: Functions tests
        working-directory: functions
        run: npm run test:functions
      - name: Firestore Rules tests
        working-directory: functions
        run: npm run test:rules
      - name: Functions production dependency audit
        working-directory: functions
        run: npm audit --omit=dev --audit-level=high
      - name: Install portal workspaces
        run: pnpm install --frozen-lockfile
      - name: Portal production dependency audit
        run: pnpm audit --prod --audit-level high
