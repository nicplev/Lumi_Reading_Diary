name: demo-readiness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'admin/**'
      - 'functions/**'
      - 'lib/**'
      - 'test/**'
      - 'packages/**'
      - 'school-admin-web/**'
      - 'scripts/demo-readiness-local.sh'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase*.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pubspec.lock'
      - 'pubspec.yaml'
      - '.github/workflows/demo-readiness.yml'
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'functions/**'
      - 'lib/**'
      - 'test/**'
      - 'packages/**'
      - 'school-admin-web/**'
      - 'scripts/demo-readiness-local.sh'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase*.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pubspec.lock'
      - 'pubspec.yaml'
      - '.github/workflows/demo-readiness.yml'

permissions:
  contents: read

concurrency:
  group: demo-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          # Pinned deliberately. This was `channel: stable` with no version, so
          # CI floated to whatever stable was newest — meaning an upstream
          # Flutter release could turn main red with no change on our side.
          #
          # 3.44.6 asserts "ListTile background color or ink splashes may be
          # invisible" on a ListTile whose nearest Material ancestor sits below
          # a decorated background. 3.41.6 does not, which is how that shape
          # survived in account_screen.dart and teacher_classroom_screen.dart
          # with the tints and ripples silently not painting. Both are fixed;
          # this pin is what proves it, since the bug is unobservable on 3.41.
          #
          # Local dev may still be on 3.41.6. If a test passes locally and
          # fails here, suspect a version-gated assertion before suspecting
          # the test.
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci
      - name: Install Flutter dependencies
        run: flutter pub get
      - name: Run the complete demo regression gate
        run: pnpm test:demo-readiness
