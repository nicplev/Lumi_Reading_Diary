name: Admin deploy

# Deploys admin/ to Firebase Hosting (site: lumi-dev-admin-au) via the web
# frameworks experiment. Triggers only on changes that can affect the admin
# build — Flutter-only commits skip this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/admin-deploy.yml'
  workflow_dispatch: {}

# Serialize deploys on main so two near-simultaneous pushes don't race; do not
# cancel an in-flight deploy because partial Cloud Run rollouts are ugly.
concurrency:
  group: admin-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    steps:
      - uses: actions/checkout@v4

      # pnpm version is sourced from the root package.json `packageManager`
      # field; passing `version:` here conflicts with it.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      # firebase-tools' web frameworks pipeline runs `npm install` internally
      # in admin/, and npm doesn't speak pnpm's workspace: protocol. Rewriting
      # the two workspace refs to file: paths keeps them resolvable for npm
      # (it copies the dir contents into node_modules); Next's
      # transpilePackages config handles the TS-only sources at build time.
      - name: "Rewrite @lumi/* workspace refs to file: protocol"
        run: |
          jq '.dependencies."@lumi/types" = "file:../packages/types" |
              .dependencies."@lumi/server-ops" = "file:../packages/server-ops"' \
              admin/package.json > admin/package.json.tmp
          mv admin/package.json.tmp admin/package.json
          echo "=== admin deps after rewrite ==="
          jq '.dependencies | with_entries(select(.key | startswith("@lumi")))' admin/package.json

      # firebase deploy --only hosting:admin still runs firebase.json#functions
      # .predeploy because the web frameworks deploy treats the SSR Cloud Run
      # as a function and inherits the predeploy chain. Stripping the entire
      # functions block scopes this workflow to hosting only — local
      # `firebase deploy --only functions` is unaffected since the on-disk
      # firebase.json keeps its functions config.
      - name: Strip functions block from firebase.json (hosting-only deploy)
        run: |
          jq 'del(.functions)' firebase.json > firebase.json.tmp
          mv firebase.json.tmp firebase.json
          echo "=== firebase.json top-level keys after strip ==="
          jq 'keys' firebase.json

      # firebase-tools uploads admin/ to Cloud Build, which runs its own
      # `npm install` in an isolated container — our GH-runner-only
      # NPM_CONFIG_LEGACY_PEER_DEPS env var doesn't reach it. Writing
      # legacy-peer-deps into admin/.npmrc puts it in the source bundle that
      # Cloud Build extracts, so npm install there inherits the setting.
      # date-fns is the current conflict: tremor wants v3, base-ui wants v4.
      - name: "Write admin/.npmrc with legacy-peer-deps for Cloud Build"
        run: |
          {
            echo "legacy-peer-deps=true"
          } > admin/.npmrc

      # The Next.js build needs every NEXT_PUBLIC_* it'll embed in the client
      # bundle. The Admin SDK uses the Cloud Run runtime's attached service
      # account via ADC; never copy a JSON private key into this build file.
      # The public API/App ids come from GH secrets so configuration remains
      # managed in one place even though Firebase client identifiers are not
      # credentials.
      - name: Write admin/.env.production
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: |
          {
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=lumi-ninc-au.firebaseapp.com"
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=lumi-ninc-au"
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=lumi-ninc-au.firebasestorage.app"
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=3795320704"
            echo "FUNCTIONS_REGION=australia-southeast1"
            echo "SESSION_COOKIE_MAX_AGE=432000"
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}"
            echo "NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}"
          } > admin/.env.production

      - name: Deploy to Firebase Hosting (admin)
        # @tremor/react@3 peer-requires react@^18 but admin uses react@19.
        # pnpm tolerates this skew; npm 11 (which firebase-tools spawns
        # internally for prepareFrameworks) does not. The env var below
        # propagates to that internal `npm i --omit dev` and tells it to
        # accept the existing peer-dep resolution instead of erroring out.
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LUMI_NINC_AU }}
          projectId: lumi-ninc-au
          target: admin
          channelId: live
