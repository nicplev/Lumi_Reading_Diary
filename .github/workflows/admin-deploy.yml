name: Admin deploy

# Deploys admin/ to Firebase Hosting (site: lumi-dev-admin) via the web
# frameworks experiment. Triggers only on changes that can affect the admin
# build — Flutter-only commits skip this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/admin-deploy.yml'
  workflow_dispatch: {}

# Serialize deploys on main so two near-simultaneous pushes don't race; do not
# cancel an in-flight deploy because partial Cloud Run rollouts are ugly.
concurrency:
  group: admin-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      # The Next.js build needs every NEXT_PUBLIC_* it'll embed in the client
      # bundle, and the Admin SDK needs FIREBASE_SERVICE_ACCOUNT_KEY at
      # runtime. Public Firebase config values that are project identifiers
      # (not secrets) are inlined; the credential and the API/App ids come
      # from GH secrets so they're never committed.
      - name: Write admin/.env.production
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          {
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=lumi-kakakids.firebaseapp.com"
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=lumi-kakakids"
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=lumi-kakakids.firebasestorage.app"
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=432054475733"
            echo "SESSION_COOKIE_MAX_AGE=432000"
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}"
            echo "NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}"
            echo "FIREBASE_SERVICE_ACCOUNT_KEY=${FIREBASE_SERVICE_ACCOUNT_KEY}"
          } > admin/.env.production

      - name: Deploy to Firebase Hosting (admin)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LUMI_KAKAKIDS }}
          projectId: lumi-kakakids
          target: admin
          channelId: live
