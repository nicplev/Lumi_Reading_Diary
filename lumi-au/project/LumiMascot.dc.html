<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:180,&quot;height&quot;:192},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#EC4544&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cheek&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#F5A1C5&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;highlightOpacity&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:0.16,&quot;min&quot;:0,&quot;max&quot;:1,&quot;step&quot;:0.02,&quot;tsType&quot;:&quot;number&quot;}}">

  renderVals() {

      color: this.props.color ?? '#EC4544',
      cheek: this.props.cheek ?? '#F5A1C5',

}
</script>
