name = "lumi-status-worker"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# Replace with your KV namespace IDs after running:
#   wrangler kv:namespace create STATUS_KV
#   wrangler kv:namespace create STATUS_KV --preview
[[kv_namespaces]]
binding = "STATUS_KV"
id = "REPLACE_WITH_PROD_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

# Set with: wrangler secret put ADMIN_TOKEN
# (do NOT commit the token here)
