<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Nunito';
    font-weight: 800;
    src: url('nunito-extrabold.woff2') format('woff2');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Nunito', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* Soft brand background: accent tint wash over cream, with a faint
     radial glow so the panel doesn't read as a flat color block. */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--tint) 0%, transparent 70%),
      radial-gradient(140% 100% at 50% 115%, var(--tint) 0%, transparent 60%),
      #FBFAF6;
  }
  .headline {
    color: #1A1A1A;
    text-align: center;
    font-weight: 800;
    line-height: 1.12;
    letter-spacing: -0.5px;
    text-wrap: balance;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 60px;
  }
  .device {
    background: #1A1A1A;
    box-shadow: 0 40px 90px rgba(26,26,26,0.28);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .device img { display: block; }
</style>
</head>
<body>
<div class="headline" id="headline"></div>
<div class="device" id="device"><img id="shot"></div>
<script>
  const q = new URLSearchParams(location.search);
  const tint = q.get('tint') || '#F4B5B7';
  const title = q.get('title') || '';
  const img = q.get('img') || '';
  const device = q.get('device') || 'iphone';
  document.body.style.setProperty('--tint', tint);
  document.getElementById('headline').textContent = title;
  const shot = document.getElementById('shot');
  shot.src = img;

  // Fixed-pixel layout per canvas so output is exact at dpr=1.
  const headline = document.getElementById('headline');
  const frame = document.getElementById('device');
  if (device === 'iphone') {
    // canvas 1320x2868
    headline.style.height = '300px';
    headline.style.fontSize = '86px';
    headline.style.maxWidth = '1200px';
    const bezel = 16, imgW = 1108;               // 1108 * 2868/1320 = 2407
    const imgH = Math.round(imgW * 2868 / 1320); // 2407
    shot.style.width = imgW + 'px';
    shot.style.height = imgH + 'px';
    shot.style.borderRadius = '48px';
    frame.style.padding = bezel + 'px';
    frame.style.borderRadius = (48 + bezel) + 'px';
  } else {
    // canvas 2752x2064 (landscape)
    headline.style.height = '250px';
    headline.style.fontSize = '84px';
    headline.style.maxWidth = '2200px';
    const bezel = 18, imgH = 1620;               // 1620 * 2752/2064 = 2160
    const imgW = Math.round(imgH * 2752 / 2064); // 2160
    shot.style.width = imgW + 'px';
    shot.style.height = imgH + 'px';
    shot.style.borderRadius = '36px';
    frame.style.padding = bezel + 'px';
    frame.style.borderRadius = (36 + bezel) + 'px';
  }
</script>
</body>
</html>
