<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Nunito';
    font-weight: 800;
    src: url('nunito-extrabold.woff2') format('woff2');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Nunito', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* Soft brand background: accent tint wash over cream, with a faint
     radial glow so the panel doesn't read as a flat color block. */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--tint) 0%, transparent 70%),
      radial-gradient(140% 100% at 50% 115%, var(--tint) 0%, transparent 60%),
      #FBFAF6;
  }
  .headline {
    color: #1A1A1A;
    text-align: center;
    font-weight: 800;
    line-height: 1.12;
    letter-spacing: -0.5px;
    text-wrap: balance;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 60px;
  }

  /* ── Device chassis ─────────────────────────────────────────────
     Drawn, not photographed: a metallic frame ring with hardware
     buttons, a matte inner bezel, and the screen. The captures carry
     their own Dynamic Island / rounded content, which sells it. */
  .chassis {
    position: relative;
    /* Natural titanium: bright enough to read against both the pastel
       background AND the black bezel, even at thumbnail scale. */
    background: linear-gradient(145deg,
      #d9d7d3 0%, #a8a5a0 18%, #c9c6c1 40%,
      #918e89 62%, #bfbcb7 82%, #d3d1cd 100%);
    box-shadow:
      0 50px 110px rgba(26,26,26,0.32),
      0 12px 34px rgba(26,26,26,0.22),
      inset 0 0 4px rgba(255,255,255,0.7),
      inset 0 0 1px rgba(0,0,0,0.35);
  }
  .bezel {
    background: #0a0a0b;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .bezel img { display: block; }

  /* Hardware buttons: metallic nubs attached to the frame edge. */
  .btn {
    position: absolute;
    background: linear-gradient(90deg, #cfccc7, #8f8c87 50%, #c2bfba);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.55), 0 0 1px rgba(0,0,0,0.4);
  }
  .btn.h { background: linear-gradient(180deg, #cfccc7, #8f8c87 50%, #c2bfba); }

  /* iPad camera dot on the top bezel edge (landscape). */
  .cam {
    position: absolute;
    background: radial-gradient(circle at 40% 35%, #2e3d4d 0%, #0c1117 55%, #000 100%);
    border-radius: 50%;
    box-shadow: inset 0 0 2px rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
<div class="headline" id="headline"></div>
<div class="chassis" id="chassis"><div class="bezel" id="bezel"><img id="shot"></div></div>
<script>
  const q = new URLSearchParams(location.search);
  const tint = q.get('tint') || '#F4B5B7';
  const title = q.get('title') || '';
  const img = q.get('img') || '';
  const device = q.get('device') || 'iphone';
  document.body.style.setProperty('--tint', tint);
  document.getElementById('headline').textContent = title;
  const shot = document.getElementById('shot');
  shot.src = img;

  const headline = document.getElementById('headline');
  const chassis = document.getElementById('chassis');
  const bezel = document.getElementById('bezel');

  const btn = (cls, style) => {
    const b = document.createElement('div');
    b.className = 'btn ' + cls;
    Object.assign(b.style, style);
    chassis.appendChild(b);
  };

  if (device === 'iphone') {
    // canvas 1320x2868 — iPhone 17 Pro Max: titanium ring, slim even bezel.
    headline.style.height = '290px';
    headline.style.fontSize = '86px';
    headline.style.maxWidth = '1200px';
    const ring = 13, pad = 20, imgW = 1092;
    const imgH = Math.round(imgW * 2868 / 1320);          // 2372
    shot.style.width = imgW + 'px';
    shot.style.height = imgH + 'px';
    shot.style.borderRadius = '52px';
    bezel.style.padding = pad + 'px';
    bezel.style.borderRadius = (52 + pad) + 'px';
    chassis.style.padding = ring + 'px';
    chassis.style.borderRadius = (52 + pad + ring) + 'px';

    // Left edge: action button + volume up/down. Right edge: power.
    // Positions proportional to the real device.
    const H = imgH + 2 * (pad + ring);
    btn('h', { left: '-7px', top: Math.round(H * 0.155) + 'px', width: '8px', height: '58px',  borderRadius: '4px' });
    btn('h', { left: '-7px', top: Math.round(H * 0.235) + 'px', width: '8px', height: '118px', borderRadius: '4px' });
    btn('h', { left: '-7px', top: Math.round(H * 0.295) + 'px', width: '8px', height: '118px', borderRadius: '4px' });
    btn('h', { right: '-7px', top: Math.round(H * 0.245) + 'px', width: '8px', height: '190px', borderRadius: '4px' });
  } else {
    // canvas 2752x2064 landscape — iPad Pro 13": aluminum ring, uniform bezel,
    // camera centered on the top (landscape) bezel.
    headline.style.height = '240px';
    headline.style.fontSize = '84px';
    headline.style.maxWidth = '2200px';
    chassis.style.background = 'linear-gradient(145deg, #e2e2e6 0%, #9a9aa0 20%, #cfcfd4 45%, #8e8e94 65%, #d6d6da 100%)';
    const ring = 6, pad = 56, imgH = 1548;
    const imgW = Math.round(imgH * 2752 / 2064);          // 2064
    shot.style.width = imgW + 'px';
    shot.style.height = imgH + 'px';
    shot.style.borderRadius = '28px';
    bezel.style.padding = pad + 'px';
    bezel.style.borderRadius = (28 + pad) + 'px';
    chassis.style.padding = ring + 'px';
    chassis.style.borderRadius = (28 + pad + ring) + 'px';

    // Camera dot centered in the top bezel.
    const cam = document.createElement('div');
    cam.className = 'cam';
    Object.assign(cam.style, {
      top: (ring + Math.round(pad / 2) - 7) + 'px',
      left: '50%', transform: 'translateX(-50%)',
      width: '14px', height: '14px',
    });
    chassis.appendChild(cam);

    // Top edge (landscape): power at left, volume pair at right.
    const W = imgW + 2 * (pad + ring);
    btn('', { top: '-4px', left: Math.round(W * 0.055) + 'px', width: '110px', height: '5px', borderRadius: '3px' });
    btn('', { top: '-4px', right: Math.round(W * 0.055) + 'px', width: '78px', height: '5px', borderRadius: '3px' });
    btn('', { top: '-4px', right: Math.round(W * 0.055) + 78 + 14 + 'px', width: '78px', height: '5px', borderRadius: '3px' });
  }
</script>
</body>
</html>
